apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: golden-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      containers:
        - name: portal
          image: 059797578166.dkr.ecr.ap-southeast-2.amazonaws.com/golden-demo/portal:vuln
          imagePullPolicy: Always
          env:
            - name: PGHOST
              value: postgres
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: portal
  namespace: golden-demo
spec:
  # ClusterIP - NOT internet-exposed. The portal runs an intentionally
  # vulnerable Struts2 (CVE-2017-5638), which is mass-scanned across the
  # internet, so it must never sit behind a public LoadBalancer. Sysdig still
  # sees the image and all runtime activity (it watches the pod, not the LB).
  # Reach it for the demo with:
  #   kubectl port-forward -n golden-demo svc/portal 8080:80
  type: ClusterIP
  selector:
    app: portal
  ports:
    - port: 80
      targetPort: 8080
