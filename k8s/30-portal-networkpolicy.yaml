# Blast-radius control for the intentionally-vulnerable Struts2 portal.
# If the container is popped (CVE-2017-5638 RCE), egress is denied by default
# so it cannot pull node IAM credentials from IMDS (169.254.169.254), phone
# home, or pivot out to the internet. The portal legitimately needs DNS and
# the Postgres pod (the demo's pg_dump exfil step runs over this allowed path,
# which is the point - exfil to a DB the app already talks to, not to the
# internet). Ingress is untouched so probes and `kubectl port-forward` work.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: portal-egress
  namespace: golden-demo
spec:
  podSelector:
    matchLabels:
      app: portal
  policyTypes:
    - Egress
  egress:
    # DNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Postgres - the customer DB the portal serves (and the exfil target).
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
