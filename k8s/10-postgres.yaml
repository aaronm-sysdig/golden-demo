apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: golden-demo
type: Opaque
stringData:
  username: portal
  password: s3cr3t
  database: customers
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: golden-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:13
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "portal"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: initdb
          configMap:
            name: pg-initdb
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: golden-demo
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
