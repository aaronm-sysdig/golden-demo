apiVersion: v1
kind: Pod
metadata:
  name: claude-demo
  namespace: claude
  labels:
    app: claude-demo
spec:
  restartPolicy: Never
  containers:
    - name: claude
      image: 059797578166.dkr.ecr.ap-southeast-2.amazonaws.com/golden-demo/claude-demo:v8
      imagePullPolicy: IfNotPresent
      command: ["sleep", "infinity"]
      env:
        - name: HOME
          value: /root
